<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQLOrb Studio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; color: #333; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px;}
        .editor-container { border: 1px solid #ccc; border-radius: 8px; overflow: hidden; background-color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        .CodeMirror { height: 200px; font-size: 16px; font-family: 'Consolas', 'Monaco', monospace; }
        .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px;}
        .validate-btn { background-color: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: 600; transition: background 0.2s;}
        .validate-btn:hover { background-color: #218838; }
        
        /* Toggle */
        .switch-container { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #555; font-weight: 500;}
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Results */
        #result-area { margin-top: 20px; display: none; }
        #result-box { padding: 15px; border-radius: 5px; margin-bottom: 10px; white-space: pre-wrap; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Suggestion */
        #suggestion-box { background-color: #e2e6ea; border: 1px solid #d6d8db; color: #383d41; padding: 15px; border-radius: 5px; display: none; font-family: 'Consolas', monospace; }
        .suggestion-label { font-weight: bold; color: #0056b3; display: block; margin-bottom: 5px; font-family: 'Segoe UI', sans-serif; }
    </style>
</head>
<body>

    <h1>SQLOrb</h1>
    <p style="text-align:center; color:#666; margin-bottom: 30px;">Professional SQL Validator</p>
    
    <div class="editor-container">
        <textarea id="sqlInput"></textarea>
    </div>

    <div class="controls-bar">
        <button class="validate-btn" onclick="checkSyntax()">Validate Query</button>
        <div class="switch-container">
            <span>Autocomplete</span>
            <label class="switch">
                <input type="checkbox" id="autocompleteToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="result-area">
        <div id="result-box"></div>
        <div id="suggestion-box">
            <span class="suggestion-label">💡 Suggested Fix:</span>
            <span id="suggestion-text"></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/sql-hint.min.js"></script>

    <script>
        var editor = CodeMirror.fromTextArea(document.getElementById("sqlInput"), {
            mode: "text/x-sql",
            theme: "default",         
            lineNumbers: true,
            indentWithTabs: true,
            smartIndent: true,
            extraKeys: {}, 
            hintOptions: { tables: { "users": ["id", "name", "email", "age"], "students": ["id", "name", "age", "grade"] } }
        });

        document.getElementById("autocompleteToggle").addEventListener("change", function(e) {
            editor.setOption("extraKeys", e.target.checked ? {"Ctrl-Space": "autocomplete"} : {});
        });

        async function checkSyntax() {
            const sql = editor.getValue(); 
            const resultArea = document.getElementById("result-area");
            const resultBox = document.getElementById("result-box");
            const suggestionBox = document.getElementById("suggestion-box");
            const suggestionText = document.getElementById("suggestion-text");
            
            resultArea.style.display = "block";
            suggestionBox.style.display = "none";
            resultBox.innerText = "Checking...";
            resultBox.className = "";

            try {
                const response = await fetch("http://localhost:8000/validate", { 
                    method: "POST", body: sql
                });

                // Read text first to debug if JSON fails
                const text = await response.text(); 
                let data;
                
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error("Server returned invalid JSON: " + text);
                }

                if (data.status === "success") {
                    resultBox.className = "success";
                    resultBox.innerText = data.message;
                } else {
                    resultBox.className = "error";
                    resultBox.innerText = "❌ " + data.message;
                    if (data.suggestion) {
                        suggestionBox.style.display = "block";
                        suggestionText.innerText = data.suggestion;
                    }
                }
            } catch (err) {
                resultBox.className = "error";
                console.error(err);
                resultBox.innerText = "Connection Error: " + err.message;
            }
        }
    </script>
</body>
</html>
